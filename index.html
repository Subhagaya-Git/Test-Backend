<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced GPS Tracker (History & Path)</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; }
        #map { height: 75vh; width: 100%; }
        .controls { padding: 15px; text-align: center; }
        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 30px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
        }
        #status { font-size: 13px; color: #555; margin-top: 10px; }
    </style>
</head>

<body>

<div id="map"></div>

<div class="controls">
    <button onclick="startTracking()">🚀 Start Live Tracking</button>
    <p id="status">Statues: Connecting...</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    // 🔥 KEEP FIREBASE FOR READING ONLY
    const FIREBASE_HISTORY_URL = "https://my-gps-tracker-5c44b-default-rtdb.asia-southeast1.firebasedatabase.app/history.json";

    // 🔥 ADD AZURE API (WRITE PATH)
    const API_URL = "https://<your-azure-app>.azurewebsites.net/api/GetGPSData";

    var map = L.map('map').setView([7.8731, 80.7718], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 🔥 FIX marker init
    var marker = null;

    var pathLine = L.polyline([], {color: 'red', weight: 5}).addTo(map);

    setInterval(async () => {
        try {
            const response = await fetch(FIREBASE_HISTORY_URL);
            const data = await response.json();

            if (data) {
                let pathPoints = [];
                let lastPos = null;

                // 🔥 FIX: SORT BY TIME (VERY IMPORTANT)
                Object.values(data)
                    .sort((a, b) => new Date(a.time) - new Date(b.time))
                    .forEach(point => {
                        let coords = [point.lat, point.lon];
                        pathPoints.push(coords);
                        lastPos = coords;
                    });

                if (lastPos) {

                    // 🔥 FIX marker creation/update
                    if (!marker) {
                        marker = L.marker(lastPos).addTo(map).bindPopup("I'm here!");
                    } else {
                        marker.setLatLng(lastPos);
                    }

                    pathLine.setLatLngs(pathPoints);

                    // 🔥 smoother movement
                    map.setView(lastPos, 16);

                    document.getElementById("status").innerText =
                        "Update: " + new Date().toLocaleTimeString();
                }
            }

        } catch (e) {
            console.log("Error fetching history");
        }
    }, 3000);

    function startTracking() {

        if (!navigator.geolocation)
            return alert("GPS support නැත.");

        navigator.geolocation.watchPosition(async (pos) => {

            console.log("LAT:", pos.coords.latitude);
            console.log("LON:", pos.coords.longitude);

            const payload = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                time: new Date().toISOString()
            };

            // 🔥 FIX: SEND TO AZURE (NOT FIREBASE)
            await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

        }, null, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });

        document.getElementById("status").innerText = "Tracking active...";
    }

</script>

</body>
</html>
