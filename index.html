<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced GPS Tracker (History & Path)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; }
        #map { height: 75vh; width: 100%; }
        .controls { padding: 15px; text-align: center; }
        button { 
            padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 30px; 
            border: none; background: #007bff; color: white; font-weight: bold;
        }
        #status { font-size: 13px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="controls">
    <button onclick="startTracking()">🚀 Start Live Tracking</button>
    <p id="status">තත්ත්වය: සම්බන්ධ වෙමින්...</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ඔබේ Firebase URL එක (මෙහි /location.json වෙනුවට /history.json භාවිතා වේ)
    const FIREBASE_HISTORY_URL = "https://my-gps-tracker-5c44b-default-rtdb.asia-southeast1.firebasedatabase.app/history.json";

    var map = L.map('map').setView([7.8731, 80.7718], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var marker = L.marker([0, 0]).addTo(map).bindPopup("මම මෙතැන!");
    
    // ගමන් මග ඇඳීමට Polyline එකක් සකස් කිරීම
    var pathLine = L.polyline([], {color: 'red', weight: 5}).addTo(map);

    // --- 1. ඉතිහාසය සහ ගමන් මග ලබා ගැනීම ---
    setInterval(async () => {
        try {
            const response = await fetch(FIREBASE_HISTORY_URL);
            const data = await response.json();
            
            if (data) {
                let pathPoints = [];
                let lastPos = null;

                // Firebase හි ඇති සියලුම දත්ත පේළියට ලබා ගැනීම
                Object.keys(data).forEach(key => {
                    let point = [data[key].lat, data[key].lon];
                    pathPoints.push(point);
                    lastPos = point;
                });

                if (lastPos) {
                    marker.setLatLng(lastPos); // Marker එක අන්තිම තැනට ගෙන යයි
                    pathLine.setLatLngs(pathPoints); // ඉර ඇඳීම සිදු කරයි
                    map.panTo(lastPos); // සිතියම අන්තිම තැනට නාභිගත කරයි
                    document.getElementById("status").innerText = "Update: " + new Date().toLocaleTimeString();
                }
            }
        } catch (e) { console.log("Error fetching history"); }
    }, 3000);

    // --- 2. සැබෑ GPS දත්ත Firebase වෙත යැවීම ---
    function startTracking() {
        if (!navigator.geolocation) return alert("GPS support නැත.");

        navigator.geolocation.watchPosition(async (pos) => {
            const payload = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                time: new Date().toISOString()
            };

            // මෙහි POST භාවිතා කරන්නේ දත්ත එකින් එක (List එකක් ලෙස) එකතු කිරීමටයි
            await fetch(FIREBASE_HISTORY_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
        }, null, { enableHighAccuracy: true });
        
        document.getElementById("status").innerText = "Tracking සක්‍රීයයි...";
    }
</script>
</body>
</html>
