<!DOCTYPE html>
<html>
<head>
    <title>GPS Tracker - Simple Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>#map { height: 80vh; width: 100%; }</style>
</head>
<body>
    <div id="map"></div>
    <button onclick="startTracking()">🚀 Start My Tracking</button>
    <p id="status">Status: Ready</p>

    <script>
        const API_URL = "https://my-unique-gps-tracker-01-c9csdeb3cjbmb8fq.southeastasia-01.azurewebsites.net/api/GetGPSData";
        var map = L.map('map').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        // සෑම තත්පර 3 කට වරක්ම Server එකෙන් දත්ත ලබා ගැනීම
        setInterval(async () => {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if(data.lat) {
                    marker.setLatLng([data.lat, data.lon]);
                    map.setView([data.lat, data.lon]);
                    document.getElementById("status").innerText = "Last Update: " + new Date().toLocaleTimeString();
                }
            } catch (e) { console.log("Waiting for data..."); }
        }, 3000);

        // දුරකථනයෙන් දත්ත යැවීම
        async function startTracking() {
            navigator.geolocation.watchPosition(async (pos) => {
                const payload = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
            }, null, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
