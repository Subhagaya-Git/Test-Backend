<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; }
        #map { height: 70vh; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 20px; text-align: center; }
        h2 { color: #333; margin-top: 10px; }
        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; 
            border-radius: 50px; background: linear-gradient(135deg, #28a745, #218838); 
            color: white; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }
        button:active { transform: scale(0.95); }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
        .marker-label { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="container">
        <h2>📍 Live GPS Tracker</h2>
        <button onclick="startTracking()">🚀 Start My Live Tracking</button>
        <p id="status">තත්ත්වය: දත්ත එනතුරු රැඳී සිටී...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- 1. ඔබගේ නිවැරදි FIREBASE URL එක ---
        // ඔබ ලබා දුන් පින්තූරය අනුව මෙම ලින්ක් එක සකසා ඇත.
        const FIREBASE_URL = "https://my-gps-tracker-5c44b-default-rtdb.asia-southeast1.firebasedatabase.app/location.json";

        // --- 2. සිතියම (Map) සකස් කිරීම ---
        // මුලින්ම සිතියම ලංකාවට පෙන්වන ලෙස සකසයි.
        var map = L.map('map').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // සිතියම මත පෙන්වන Marker එක
        var marker = L.marker([0, 0]).addTo(map).bindPopup("<b class='marker-label'>මම මෙතැන ඉන්නවා!</b>");

        // --- 3. දත්ත ලබා ගැනීම (Firebase -> Map) ---
        // සෑම තත්පර 3 කට වරක්ම Firebase එකෙන් අලුත් Location එකක් තිබේදැයි බලයි.
        setInterval(async () => {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                if (data && data.lat && data.lon) {
                    const newPos = [data.lat, data.lon];
                    marker.setLatLng(newPos);
                    map.setView(newPos, 16); // සිතියම අදාළ ස්ථානයට Zoom කරයි.
                    document.getElementById("status").innerText = "අවසන් වරට යාවත්කාලීන වූයේ: " + new Date().toLocaleTimeString();
                }
            } catch (error) {
                console.log("දත්ත ලබා ගැනීමේ දෝෂයක්:", error);
            }
        }, 3000);

        // --- 4. දත්ත යැවීම (Phone GPS -> Firebase) ---
        function startTracking() {
            if (!navigator.geolocation) {
                alert("ඔබේ Browser එක GPS සඳහා සහය නොදක්වයි.");
                return;
            }

            // දුරකථනයේ GPS පිහිටීම වෙනස් වන සෑම විටම Firebase එකට දත්ත යවයි.
            navigator.geolocation.watchPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                const payload = {
                    lat: lat,
                    lon: lon,
                    timestamp: new Date().toISOString()
                };

                try {
                    await fetch(FIREBASE_URL, {
                        method: 'PUT', // කලින් තිබූ දත්ත ඉවත් කර අලුත් දත්ත දැමීමට
                        body: JSON.stringify(payload)
                    });
                    console.log("Location sent to Firebase:", payload);
                } catch (error) {
                    console.error("දත්ත යැවීමේ දෝෂයක්:", error);
                }

            }, (error) => {
                if (error.code === error.PERMISSION_DENIED) {
                    alert("කරුණාකර GPS සඳහා අවසර (Allow) ලබා දෙන්න.");
                }
            }, {
                enableHighAccuracy: true, // වඩාත් නිවැරදි GPS දත්ත ලබා ගැනීමට
                maximumAge: 0
            });
        }
    </script>
</body>
</html>
